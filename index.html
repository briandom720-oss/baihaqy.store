<!DOCTYPE html>

<title>Baihaqy Store</title>

<style>
*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:#f5f5f5;
padding-bottom:70px;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
align-items:center;
gap:12px;
}

.logo{
width:45px;
height:45px;
background:#ff3b3b;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.search{
margin:15px;
background:white;
padding:12px;
border-radius:20px;
color:#888;
}

.banner{
margin:15px;
height:150px;
background:linear-gradient(45deg,#111,#ff3333);
border-radius:20px;
color:white;
padding:25px;
font-size:25px;
font-weight:bold;
}

h2{
margin-left:15px;
}

.category{
display:flex;
gap:10px;
padding:0 15px;
overflow:auto;
}

.category button{
border:0;
padding:10px 20px;
border-radius:20px;
background:white;
}

.category .active{
background:#111;
color:white;
}

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
}

.card img{
width:100%;
height:130px;
object-fit:cover;
}

.info{
padding:10px;
}

.price{
font-size:18px;
font-weight:bold;
}

.old{
color:#999;
text-decoration:line-through;
font-size:13px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
height:65px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -2px 10px #ddd;
}

.bottom div{
text-align:center;
font-size:12px;
}

</style>
</head>

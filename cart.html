<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keranjang</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.item{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:15px;
}

.total{
font-size:22px;
font-weight:bold;
margin-top:20px;
}

button{
width:100%;
padding:15px;
border:0;
background:#ff3b3b;
color:white;
font-size:18px;
border-radius:12px;
margin-top:20px;
}

</style>

</head>

<body>

<h2>🛒 Keranjang</h2>

<div id="cart"></div>

<div class="total" id="total"></div>

<button>
Checkout
</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let html="";
let total=0;

cart.forEach(item=>{

html+=`
<div class="item">
<h3>${item.nama}</h3>
<p>Rp${item.harga}</p>
</div>
`;

total+=item.harga;

});

document.getElementById("cart").innerHTML=html;

document.getElementById("total").innerHTML="Total : Rp"+total;

</script>

</body>

</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Produk</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:15px;
}

img{
width:100%;
height:250px;
object-fit:cover;
}

.box{
padding:20px;
background:white;
margin-top:-10px;
border-radius:20px 20px 0 0;
}

.price{
font-size:28px;
color:#ff3b3b;
font-weight:bold;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:0;
border-radius:12px;
font-size:17px;
font-weight:bold;
}

.cart{
background:#ddd;
}

.buy{
background:#ff3b3b;
color:white;
}
</style>

</head>

<body>

<header onclick="history.back()" style="cursor:pointer;">
← Kembali
</header>

<img src="https://picsum.photos/500/300">

<div class="box">

<h2>Video Premium 01</h2>

<p class="price">
Rp5.000
</p>

<p>
Video premium kualitas HD.
Cocok untuk TikTok, Instagram Reels, dan YouTube Shorts.

<br><br>

✔ Resolusi Full HD<br>
✔ Tanpa Watermark<br>
✔ Download Selamanya
</p>

<button class="cart" onclick="addToCart()">
Tambah ke Keranjang
</button>

<button class="buy">
Beli Sekarang
</button>

</div>
<script>

function addToCart(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
nama:"Video Premium 01",
harga:5000,
gambar:"https://picsum.photos/500/300"
});

localStorage.setItem("cart",JSON.stringify(cart));

alert("Produk berhasil ditambahkan ke keranjang!");

window.location.href="cart.html";

}

</script>
</body>
</html>
